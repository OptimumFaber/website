<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Optimum Faber</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Software Studio" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #F2EDE3;
    font-family: "Roboto", -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Paper grain */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.11  0 0 0 0 0.09  0 0 0 0 0.07  0 0 0 0.045 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.7;
    mix-blend-mode: multiply;
    z-index: 1;
  }

  .center {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    animation: fade 1.2s cubic-bezier(0.2, 0.7, 0.2, 1) 0.2s forwards;
  }

  .brand {
    font-family: "Roboto", sans-serif;
    font-size: clamp(20px, 2.6vw, 28px);
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #1E1E1E;
    text-align: center;
  }

  .tagline {
    font-family: "Lora", serif;
    font-size: clamp(13px, 1.4vw, 16px);
    font-weight: 400;
    font-style: italic;
    color: #6E6452;
    text-align: center;
  }

  @keyframes fade {
    to { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .center { animation: none; opacity: 1; }
  }
</style>
</head>
<body>
<div class="center">
  <h1 class="brand">Optimum Faber</h1>
  <p class="tagline">Software Studio</p>
</div>
</body>
</html>
